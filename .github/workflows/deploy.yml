name: TransitAccess CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  DYNAMODB_TABLE: transitaccess-prod
  S3_BUCKET: transitaccess-files-prod-rakesh
  FRONTEND_BUCKET: transitaccess-frontend-prod-rakesh
  LAMBDA_FUNCTION: transitaccess-api
  IAM_ROLE: transitaccess-lambda-role
  SNS_TOPIC: transitaccess-notifications
  API_GATEWAY: transitaccess-api

jobs:
  # Stage 1: Test the transit_utils library
  test-library:
    name: Test transit_utils Library
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: library

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install library in development mode
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run library tests
        run: pytest tests/ -v --tb=short

  # Stage 2: Test and deploy the Lambda backend
  deploy-backend:
    name: Deploy Backend Infrastructure
    runs-on: ubuntu-latest
    needs: test-library
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create DynamoDB table
        run: |
          aws dynamodb describe-table --table-name ${{ env.DYNAMODB_TABLE }} 2>/dev/null || \
          aws dynamodb create-table \
            --table-name ${{ env.DYNAMODB_TABLE }} \
            --attribute-definitions \
              AttributeName=PK,AttributeType=S \
              AttributeName=SK,AttributeType=S \
              AttributeName=GSI1PK,AttributeType=S \
              AttributeName=GSI1SK,AttributeType=S \
            --key-schema \
              AttributeName=PK,KeyType=HASH \
              AttributeName=SK,KeyType=RANGE \
            --global-secondary-indexes \
              '[{"IndexName":"GSI1","KeySchema":[{"AttributeName":"GSI1PK","KeyType":"HASH"},{"AttributeName":"GSI1SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"},"ProvisionedThroughput":{"ReadCapacityUnits":5,"WriteCapacityUnits":5}}]' \
            --provisioned-throughput ReadCapacityUnits=5,WriteCapacityUnits=5 \
            --region ${{ env.AWS_REGION }}

      - name: Create S3 bucket for files
        run: |
          aws s3api head-bucket --bucket ${{ env.S3_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket \
            --bucket ${{ env.S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

      - name: Create SNS topic
        run: |
          aws sns create-topic --name ${{ env.SNS_TOPIC }} --region ${{ env.AWS_REGION }}

      - name: Create IAM role for Lambda
        run: |
          aws iam get-role --role-name ${{ env.IAM_ROLE }} 2>/dev/null || \
          aws iam create-role \
            --role-name ${{ env.IAM_ROLE }} \
            --assume-role-policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": "lambda.amazonaws.com"},
                "Action": "sts:AssumeRole"
              }]
            }'

          aws iam attach-role-policy \
            --role-name ${{ env.IAM_ROLE }} \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

          aws iam attach-role-policy \
            --role-name ${{ env.IAM_ROLE }} \
            --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess

          aws iam attach-role-policy \
            --role-name ${{ env.IAM_ROLE }} \
            --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess

          aws iam attach-role-policy \
            --role-name ${{ env.IAM_ROLE }} \
            --policy-arn arn:aws:iam::aws:policy/AmazonSNSFullAccess

      - name: Package Lambda function
        run: |
          cd backend
          pip install -r requirements.txt -t package/
          cp lambda_function.py package/
          cd package && zip -r ../lambda.zip . && cd ..

      - name: Deploy Lambda function
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SNS_ARN="arn:aws:sns:${{ env.AWS_REGION }}:${ACCOUNT_ID}:${{ env.SNS_TOPIC }}"

          aws lambda get-function --function-name ${{ env.LAMBDA_FUNCTION }} 2>/dev/null && \
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --zip-file fileb://backend/lambda.zip || \
          aws lambda create-function \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --runtime python3.11 \
            --role arn:aws:iam::${ACCOUNT_ID}:role/${{ env.IAM_ROLE }} \
            --handler lambda_function.lambda_handler \
            --zip-file fileb://backend/lambda.zip \
            --timeout 30 \
            --memory-size 256 \
            --environment "Variables={DYNAMODB_TABLE=${{ env.DYNAMODB_TABLE }},S3_BUCKET=${{ env.S3_BUCKET }},SNS_TOPIC_ARN=${SNS_ARN},REGION=${{ env.AWS_REGION }},JWT_SECRET=${{ secrets.JWT_SECRET }}}"

      - name: Create API Gateway
        run: |
          EXISTING_API=$(aws apigatewayv2 get-apis --query "Items[?Name=='${{ env.API_GATEWAY }}'].ApiId" --output text)
          if [ -z "$EXISTING_API" ]; then
            API_ID=$(aws apigatewayv2 create-api \
              --name ${{ env.API_GATEWAY }} \
              --protocol-type HTTP \
              --cors-configuration AllowOrigins='*',AllowMethods='GET,POST,PUT,DELETE,OPTIONS',AllowHeaders='Content-Type,Authorization' \
              --query ApiId --output text)

            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            LAMBDA_ARN="arn:aws:lambda:${{ env.AWS_REGION }}:${ACCOUNT_ID}:function:${{ env.LAMBDA_FUNCTION }}"

            INTEGRATION_ID=$(aws apigatewayv2 create-integration \
              --api-id $API_ID \
              --integration-type AWS_PROXY \
              --integration-uri $LAMBDA_ARN \
              --payload-format-version 2.0 \
              --query IntegrationId --output text)

            aws apigatewayv2 create-route \
              --api-id $API_ID \
              --route-key 'ANY /{proxy+}' \
              --target integrations/$INTEGRATION_ID

            aws apigatewayv2 create-stage \
              --api-id $API_ID \
              --stage-name prod \
              --auto-deploy

            aws lambda add-permission \
              --function-name ${{ env.LAMBDA_FUNCTION }} \
              --statement-id apigateway-invoke \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:${{ env.AWS_REGION }}:${ACCOUNT_ID}:${API_ID}/*/*"

            echo "API Gateway URL: https://${API_ID}.execute-api.${{ env.AWS_REGION }}.amazonaws.com/prod"
          fi

  # Stage 3: Build and deploy React frontend
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create frontend S3 bucket
        run: |
          aws s3api head-bucket --bucket ${{ env.FRONTEND_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket \
            --bucket ${{ env.FRONTEND_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

          aws s3 website s3://${{ env.FRONTEND_BUCKET }} \
            --index-document index.html \
            --error-document index.html

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.FRONTEND_BUCKET }} --delete
          echo "Frontend deployed to: http://${{ env.FRONTEND_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
