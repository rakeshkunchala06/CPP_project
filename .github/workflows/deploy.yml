name: Deploy TransitAccess

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test library
        run: cd library && pip install -e . && pip install pytest && pytest tests/ -v

  deploy-backend:
    runs-on: ubuntu-latest
    needs: test-library
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Create DynamoDB table
        run: |
          aws dynamodb describe-table --table-name transitaccess-prod --region eu-west-1 2>/dev/null || \
          aws dynamodb create-table \
            --table-name transitaccess-prod \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region eu-west-1

      - name: Create S3 bucket for files
        run: |
          aws s3api head-bucket --bucket transitaccess-files-prod-rakesh --region eu-west-1 2>/dev/null || \
          aws s3api create-bucket \
            --bucket transitaccess-files-prod-rakesh \
            --region eu-west-1 \
            --create-bucket-configuration LocationConstraint=eu-west-1
          aws s3api put-bucket-cors --bucket transitaccess-files-prod-rakesh --region eu-west-1 --cors-configuration '{
            "CORSRules": [{"AllowedHeaders": ["*"], "AllowedMethods": ["GET", "PUT", "POST"], "AllowedOrigins": ["*"], "ExposeHeaders": []}]
          }'

      - name: Create IAM role
        run: |
          if ! aws iam get-role --role-name transitaccess-lambda-role 2>/dev/null; then
            aws iam create-role --role-name transitaccess-lambda-role \
              --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'
          fi
          aws iam attach-role-policy --role-name transitaccess-lambda-role --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess || true
          aws iam attach-role-policy --role-name transitaccess-lambda-role --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess || true
          aws iam attach-role-policy --role-name transitaccess-lambda-role --policy-arn arn:aws:iam::aws:policy/AmazonSNSFullAccess || true
          aws iam attach-role-policy --role-name transitaccess-lambda-role --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole || true

      - name: Create SNS topic
        run: |
          SNS_TOPIC_ARN=$(aws sns create-topic --name transitaccess-notifications --region eu-west-1 --query 'TopicArn' --output text)
          echo "SNS_TOPIC_ARN=$SNS_TOPIC_ARN" >> $GITHUB_ENV

      - name: Wait for IAM propagation
        run: sleep 10

      - name: Package Lambda
        run: cd backend && zip -r ../lambda.zip lambda_function.py

      - name: Deploy Lambda
        run: |
          ROLE_ARN=$(aws iam get-role --role-name transitaccess-lambda-role --query 'Role.Arn' --output text)
          if aws lambda get-function --function-name transitaccess-api --region eu-west-1 > /dev/null 2>&1; then
            aws lambda update-function-code --function-name transitaccess-api --zip-file fileb://lambda.zip --region eu-west-1
            aws lambda wait function-updated --function-name transitaccess-api --region eu-west-1
            aws lambda update-function-configuration --function-name transitaccess-api \
              --runtime python3.11 --memory-size 256 --timeout 30 \
              --environment "Variables={DYNAMODB_TABLE=transitaccess-prod,S3_BUCKET=transitaccess-files-prod-rakesh,SNS_TOPIC_ARN=${{ env.SNS_TOPIC_ARN }},REGION=eu-west-1,JWT_SECRET=transitaccess-secret-2026}" \
              --region eu-west-1
          else
            aws lambda create-function --function-name transitaccess-api \
              --runtime python3.11 --role "$ROLE_ARN" --handler lambda_function.lambda_handler \
              --zip-file fileb://lambda.zip --memory-size 256 --timeout 30 \
              --environment "Variables={DYNAMODB_TABLE=transitaccess-prod,S3_BUCKET=transitaccess-files-prod-rakesh,SNS_TOPIC_ARN=${{ env.SNS_TOPIC_ARN }},REGION=eu-west-1,JWT_SECRET=transitaccess-secret-2026}" \
              --region eu-west-1
          fi

      - name: Setup API Gateway
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='transitaccess-api'].id" --output text --region eu-west-1)
          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            API_ID=$(aws apigateway create-rest-api --name transitaccess-api --endpoint-configuration types=REGIONAL --query 'id' --output text --region eu-west-1)
          fi
          echo "API_ID=$API_ID" >> $GITHUB_ENV

          ROOT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/'].id" --output text --region eu-west-1)
          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?pathPart=='{proxy+}'].id" --output text --region eu-west-1)
          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource --rest-api-id $API_ID --parent-id $ROOT_ID --path-part '{proxy+}' --query 'id' --output text --region eu-west-1)
          fi

          LAMBDA_ARN=$(aws lambda get-function --function-name transitaccess-api --query 'Configuration.FunctionArn' --output text --region eu-west-1)
          LAMBDA_URI="arn:aws:apigateway:eu-west-1:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations"

          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --authorization-type NONE --request-parameters "method.request.path.proxy=true" --region eu-west-1 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "$LAMBDA_URI" --region eu-west-1

          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --authorization-type NONE --region eu-west-1 2>/dev/null || true
          aws apigateway put-method-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters "method.response.header.Access-Control-Allow-Headers=true,method.response.header.Access-Control-Allow-Methods=true,method.response.header.Access-Control-Allow-Origin=true" --region eu-west-1 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --type MOCK --request-templates '{"application/json": "{\"statusCode\": 200}"}' --region eu-west-1
          aws apigateway put-integration-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'GET,POST,PUT,DELETE,OPTIONS'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'"}' --region eu-west-1

          aws apigateway put-method --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --authorization-type NONE --region eu-west-1 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "$LAMBDA_URI" --region eu-west-1

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws lambda add-permission --function-name transitaccess-api --statement-id apigw-invoke-$(date +%s) --action lambda:InvokeFunction --principal apigateway.amazonaws.com --source-arn "arn:aws:execute-api:eu-west-1:${ACCOUNT_ID}:${API_ID}/*" --region eu-west-1 2>/dev/null || true

          aws apigateway create-deployment --rest-api-id $API_ID --stage-name prod --region eu-west-1
          echo "API_URL=https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod" >> $GITHUB_ENV

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Get API URL
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='transitaccess-api'].id" --output text --region eu-west-1)
          echo "VITE_API_URL=https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod" >> $GITHUB_ENV

      - name: Build frontend
        run: |
          cd frontend
          npm install
          VITE_API_URL=${{ env.VITE_API_URL }} npm run build

      - name: Deploy frontend to S3
        run: |
          aws s3api head-bucket --bucket transitaccess-frontend-prod-rakesh 2>/dev/null || \
          aws s3api create-bucket --bucket transitaccess-frontend-prod-rakesh --region eu-west-1 --create-bucket-configuration LocationConstraint=eu-west-1

          aws s3 website s3://transitaccess-frontend-prod-rakesh --index-document index.html --error-document index.html --region eu-west-1

          aws s3api put-public-access-block --bucket transitaccess-frontend-prod-rakesh \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false" --region eu-west-1

          aws s3api put-bucket-policy --bucket transitaccess-frontend-prod-rakesh --region eu-west-1 --policy '{
            "Version": "2012-10-17",
            "Statement": [{"Sid": "PublicRead", "Effect": "Allow", "Principal": "*", "Action": "s3:GetObject", "Resource": "arn:aws:s3:::transitaccess-frontend-prod-rakesh/*"}]
          }'

          aws s3 sync frontend/dist/ s3://transitaccess-frontend-prod-rakesh --delete --region eu-west-1

          # SPA fallback: upload index.html as the object body for every named
          # client-side route so direct deep-links return HTTP 200 instead of
          # S3's default 404 (S3 website hosting returns 404 even when an
          # ErrorDocument is configured).
          for route in login register stops routes search favorites; do
            aws s3 cp frontend/dist/index.html s3://transitaccess-frontend-prod-rakesh/$route \
              --content-type "text/html" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --region eu-west-1
          done

          # Re-assert website config (idempotent) after sync
          aws s3api put-bucket-website --bucket transitaccess-frontend-prod-rakesh --region eu-west-1 --website-configuration '{
            "IndexDocument": {"Suffix": "index.html"},
            "ErrorDocument": {"Key": "index.html"}
          }'

          echo "Frontend URL: http://transitaccess-frontend-prod-rakesh.s3-website-eu-west-1.amazonaws.com"
